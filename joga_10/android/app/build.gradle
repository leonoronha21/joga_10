plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}
def hasReleaseSigning = keystoreProperties['storeFile'] != null &&
        keystoreProperties['storePassword'] != null &&
        keystoreProperties['keyAlias'] != null &&
        keystoreProperties['keyPassword'] != null

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def mapsApiKey = localProperties.getProperty('maps.apiKey') ?: System.getenv('MAPS_API_KEY')
if (mapsApiKey == null || mapsApiKey.trim().isEmpty()) {
    throw new GradleException(
        'Google Maps API key ausente. Defina maps.apiKey em android/local.properties ' +
        'ou a variavel de ambiente MAPS_API_KEY.'
    )
}

android {
    namespace "br.com.joga10.app"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "br.com.joga10.app"
        // flutter_face_liveness exige minSdk 26
        minSdkVersion 26
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        manifestPlaceholders["MAPS_API_KEY"] = mapsApiKey
        manifestPlaceholders["USES_CLEARTEXT_TRAFFIC"] = "false"
        manifestPlaceholders["WALLET_API_ENABLED"] = "false"
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            manifestPlaceholders["USES_CLEARTEXT_TRAFFIC"] = "true"
            manifestPlaceholders["WALLET_API_ENABLED"] = "true"
        }
        release {
            manifestPlaceholders["USES_CLEARTEXT_TRAFFIC"] = "false"
            manifestPlaceholders["WALLET_API_ENABLED"] = "false"
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation("com.google.android.libraries.places:places:5.3.0")
}

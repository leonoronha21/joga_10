name: joga_10
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  date_field: ^6.0.3+1
  flutter_masked_text2: ^0.9.1
  shared_preferences: ^2.0.12
  image_picker: ^0.8.3
  collection: ^1.15.0
  postgres: ^3.5.6
  bcrypt: ^1.1.3
  crypto: ^3.0.7
  intl: ^0.20.2
  geolocator: ^13.0.1
  flutter_contacts: ^1.1.9+2
  # Liveness facial (prova de vida) para a foto de perfil
  flutter_face_liveness:
    path: packages/flutter_face_liveness
  app_links: ^7.1.1
  url_launcher: ^6.3.2
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.0.0
  google_sign_in: 6.2.2
  # Detecção de rosto (bbox + olhos) para o face match documento × selfie
  google_mlkit_face_detection: ^0.13.2
  # Consulta de endereço via ViaCEP
  http: ^1.2.2
  # Google Pay (ambiente de teste) para os cartões/pagamentos
  pay: ^3.2.1
  firebase_app_check: ^0.4.4+2
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/img/icon.png
    - lib/assets/img/icon2.png
    - lib/assets/img/Joga.png
    - lib/assets/img/Joga_transparente.png
    - lib/assets/img/user_profile.jpg
    - lib/assets/img/campo.jpg
    - lib/assets/img/futebol.png
    - lib/assets/img/basquete.jpg
    - lib/assets/img/cartao.png
    - lib/assets/img/quadra-de-basquete.png
    - lib/assets/img/quadra-de-tenis.png
    - lib/assets/img/tenis.jpg
    - lib/assets/img/volei.png
    - lib/assets/img/voleibol.png
    - lib/assets/img/cartao-de-credito.png
